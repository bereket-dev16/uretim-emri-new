name: Deploy Windows Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: windows-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: [self-hosted, windows, x64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          clean: false

      - name: Verify Docker CLI
        shell: cmd
        run: powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -Command "docker version"

      - name: Run deployment script
        shell: cmd
        run: powershell.exe -NoLogo -NoProfile -ExecutionPolicy Bypass -File scripts/deploy-windows.ps1
